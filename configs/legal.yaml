# OPENER-Legal — configuration (workshop paper NLLP)
# Benchmark acté : 4 datasets légaux (2 en + pt + de), cf. paper §Datasets.

embedder:
  # Repris depuis HuggingFace (modèle du papier principal, fine-tuné contrastif + hard-mining).
  # Les 2 dépôts portent les MÊMES poids, vérifiés bit à bit identiques au checkpoint
  # local du papier principal via scripts/verify_hf_embedder.py.
  source: huggingface
  hf_repo_sup: "Thibault-GAREL/opener-sup"   # https://huggingface.co/Thibault-GAREL/opener-sup
  hf_repo_zs:  "Thibault-GAREL/opener-zs"    # https://huggingface.co/Thibault-GAREL/opener-zs
  local_fallback: "../LyRIDS_Opener/outputs/models/embedder_contrastive_hard_big"
  truncate_dim: 768
  task_prefix: "classification: "
  encoding_mode: span_in_context   # [ENT] ... [/ENT]

detector:
  # Frozen, zero-shot, threshold 0.3. Choix par tête (cf. paper §Setup) :
  #   OPENER-Sup -> GLiNER-M + probe re-fittée sur les détections du train (--fit-on-detected)
  #   OPENER-ZS  -> GLiNER-L
  checkpoint_sup: "urchade/gliner_medium-v2.1"
  checkpoint_zs:  "urchade/gliner_large-v2.1"
  threshold: 0.3

typing:
  supervised:                 # OPENER-Sup
    classifier: linear_svc
    class_weight: balanced
    C: 1.0
  zero_shot:                  # OPENER-ZS = transductif + fusion (choix acté)
    proto_mode: ensemble
    transductive: true
    refine_iters: 3
    detector_fusion: true
    beta: 0.05

eval:
  max_eval: 1000
  axes: [ami, latency_p50, energy]   # 3 axes comme le papier principal
  seed: 42
  # Incertitude : bootstrap test-set K=1000 (span-level pour gold, phrase-level
  # apparié pour l'e2e), seeds de rééchantillonnage 42/7/123.
  # Scripts : run_bootstrap_ci.py (gold) et run_bootstrap_e2e.py (e2e).

# Datasets légaux du benchmark (loaders : src/data/legal_datasets.py).
datasets:
  - name: e_ner           # E-NER (SEC/EDGAR), NLLP 2022 — ANCRE anglaise (transfert de domaine pur)
    lang: en
    source: github_conll
    path_or_id: terenceau1/E-NER-Dataset
    loader_key: e_ner     # 7 types dont COURT/GOVERNMENT/LEGISLATION (spécifique légal)
  - name: indian_legal    # Indian court judgments (Kalamkar et al.), NLLP 2022 — 2e ancre anglaise
    lang: en
    source: hf_datasets
    path_or_id: AjayMukundS/Indian_Legal_NER_Dataset
    loader_key: indian_legal   # 14 types légaux fins (COURT, JUDGE, STATUTE, PROVISION...)
  - name: lener_br        # LeNER-Br, PROPOR 2018
    lang: pt
    source: hf_datasets
    path_or_id: peluz/lener_br
    loader_key: lener_br  # clé dans legal_datasets._LEGAL_SPECS
  - name: german_ler      # German-LER, LREC 2020 — coarse (7 types) en table, fine (19) en stress test
    lang: de
    source: hf_datasets
    path_or_id: elenanereiss/german-ler
    loader_key: german_ler_coarse   # variante fine : loader_key german_ler
